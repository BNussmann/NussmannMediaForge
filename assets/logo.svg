<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">Nussmann MediaForge logo</title>
  <desc id="desc">A forged N mark combined with a media disc and play symbol.</desc>
  <defs>
    <linearGradient id="steel" x1="80" y1="36" x2="264" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8f6ff"/>
      <stop offset="0.45" stop-color="#66d9ef"/>
      <stop offset="1" stop-color="#246bfe"/>
    </linearGradient>
    <linearGradient id="ember" x1="144" y1="240" x2="304" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff7a1a"/>
      <stop offset="1" stop-color="#ffd66b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#07111f" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="960" height="320" rx="40" fill="#101820"/>

  <g filter="url(#softShadow)">
    <path d="M164 38 60 98v124l104 60 104-60V98L164 38Z" fill="#152536" stroke="#29445e" stroke-width="8"/>
    <circle cx="164" cy="160" r="76" fill="none" stroke="url(#steel)" stroke-width="20"/>
    <circle cx="164" cy="160" r="19" fill="#101820" stroke="#88f0ff" stroke-width="7"/>
    <path d="M126 218V102h34l48 74v-74h34v116h-34l-48-74v74h-34Z" fill="url(#steel)"/>
    <path d="M245 134 302 160l-57 26v-52Z" fill="url(#ember)"/>
  </g>

  <g fill="#f6fbff">
    <text x="360" y="145" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="0">Nussmann</text>
    <text x="360" y="211" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="58" font-weight="600" letter-spacing="0" fill="#8fdfff">MediaForge</text>
  </g>

  <text x="362" y="252" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="21" font-weight="500" letter-spacing="2" fill="#b6c8d8">
    RIP · TRANSCODE · ORGANIZE
  </text>
</svg>
